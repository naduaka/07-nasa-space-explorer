<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">

    <header class="site-header">
      <img src="nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <div class="header-text">
        <h1>Space Explorer</h1>
        <p>Astronomy Picture of the Day</p>
      </div>
    </header>

    <!-- RANDOM SPACE FACT (LevelUp) -->
    <div class="space-fact" id="spaceFact">
      <span class="fact-icon">🌌</span>
      <div>
        <div class="fact-label">Did You Know?</div>
        <div class="fact-text" id="factText">Loading space fact...</div>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="filters">
      <div class="filter-group">
        <label for="startDate">Start Date</label>
        <input type="date" id="startDate" />
      </div>
      <div class="filter-group">
        <label for="endDate">End Date</label>
        <input type="date" id="endDate" />
      </div>
      <button id="fetchBtn">Get Space Images</button>
    </div>

    <!-- LOADING -->
    <div id="loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">Contacting NASA...</div>
    </div>

    <!-- GALLERY -->
    <div id="gallery" class="gallery">
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
      </div>
    </div>

    <!-- FOOTER -->
    <footer class="site-footer">
      <div class="footer-links">
        <a class="footer-link" href="https://www.nasa.gov" target="_blank">NASA.gov</a>
        <a class="footer-link" href="https://apod.nasa.gov" target="_blank">APOD Archive</a>
        <a class="footer-link" href="https://api.nasa.gov" target="_blank">NASA APIs</a>
      </div>
      <span class="footer-copy">NASA Space Explorer &copy; 2026</span>
    </footer>

  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" id="modal">
      <button class="modal-close" onclick="closeModalBtn()">&#x2715;</button>
      <div id="modalMedia"></div>
      <div class="modal-body">
        <div class="modal-date" id="modalDate"></div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-explanation" id="modalExplanation"></div>
      </div>
    </div>
  </div>

  <script src="dateRange.js"></script>
  <script src="script.js"></script>
</body>
</html>
